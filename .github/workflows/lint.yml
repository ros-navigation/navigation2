name: Lint
on:
  pull_request:
  push:
    branches:
      - issue-6079_Experiment_with_semgrep #for the duration of the experiment
  workflow_dispatch: # for the duration of the experiment, to allow manual triggering of the workflow

jobs:
  ament_lint_general:
    name: ament_${{ matrix.linter }}
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-ros-rolling-ros-base-latest
    strategy:
      fail-fast: false
      matrix:
          linter: [xmllint, cpplint, uncrustify, pep257, flake8, mypy]
    steps:
    - uses: actions/checkout@v6

    - name: Install typeshed for mypy
      if: matrix.linter == 'mypy'
      run: sudo apt update && sudo apt install -y python3-typeshed

    - uses: ros-tooling/action-ros-lint@0.1.4
      with:
        linter: ${{ matrix.linter }}
        distribution: rolling
        package-name: "*"
        arguments: ${{ matrix.linter == 'mypy' && '--config tools/pyproject.toml' || '' }}

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: >-
            ament_lint_cmake,
            ament_cpplint,
            ament_uncrustify,
            ament_xmllint,
            ament_flake8,
            ament_pep257,
            ament_mypy

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
          args: --oneline

