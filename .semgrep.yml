rules:
  - id: use-nav2-node
    patterns:
      - pattern-regex: "rclcpp::Node(?!Options)\\b"
      - pattern-not-regex: "^\\s*//.*"
      - pattern-not-regex: ".*//.*rclcpp::Node"
    message: "Use nav2::Node instead of rclcpp::Node"
    severity: WARNING
    languages: [cpp]

  - id: detect-rclcpp-client
    patterns:
      - pattern-regex: "rclcpp::Client\\s*<"
      - pattern-not-regex: "^\\s*//.*"
      - pattern-not-regex: ".*//.*rclcpp::Client"
    message: "Use nav2::ServiceClient<T> instead of rclcpp::Client<T>"
    severity: WARNING
    languages: [cpp]

  - id: detect-rclcpp-service
    patterns:
      - pattern-regex: "rclcpp::Service\\s*<"
      - pattern-not-regex: "^\\s*//.*"
      - pattern-not-regex: ".*//.*rclcpp::Service"
    message: "Use nav2::ServiceServer<T> instead of rclcpp::Service<T>"
    severity: WARNING
    languages: [cpp]

