collision_detector:
  ros__parameters:
    frequency: 10.0
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    polygons: ["PolygonFront"]
    PolygonFront:
      type: "polygon"
      points: "[[0.3, 0.3], [0.3, -0.3], [0.0, -0.3], [0.0, 0.3]]"
      action_type: "none"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_front"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      enabled: true
    pointcloud:
      type: "pointcloud"
      topic: "/intel_realsense_r200_depth/points"
      transport_type: "raw" # Options: raw, zlib, draco, zstd
      min_height: 0.1
      max_height: 0.5
      enabled: true
      # dock:
      #   enabled: true
      #   type: "polygon"          # "polygon" or "circle"
      #   frame_id: "dock_link"    # frame the zone is anchored to; empty -> robot base frame (static)
      #   points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"  # polygon type only (VVF format)
      #   # radius: 0.5            # circle type only (must be > 0)
      #   min_height: -1.0         # base-frame z band a point must be within to be masked
      #   max_height: 1.0
      #   visualize: true          # publish the zone footprint as a PolygonStamped
